# Backend on Render — Docker (recommended) or Nixpacks via rootDir backend.
# Set DATABASE_URL from Neon dashboard → Connection details (pooled URI).
services:
  - type: web
    name: cms-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /server/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: pg
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_UI_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: cms-uploads
      mountPath: /var/data
      sizeGB: 1
