# Backend on Render + PostgreSQL on Neon (free tier).
# Set DATABASE_URL in Render from Neon dashboard after creating the database.
# Persistent disk is only for file uploads (DB lives in Neon).
services:
  - type: web
    name: cms-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /server/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: pg
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_UI_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: cms-uploads
      mountPath: /var/data
      sizeGB: 1
