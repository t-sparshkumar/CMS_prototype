# SQLite on persistent disk — no PostgreSQL required.
# DB + uploads live under /var/data so they survive redeploys.
services:
  - type: web
    name: cms-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /server/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: sqlite3
      - key: DB_FILE
        value: /var/data/cms.db
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_UI_URL
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: cms-data
      mountPath: /var/data
      sizeGB: 1
